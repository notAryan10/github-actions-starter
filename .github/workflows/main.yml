name: "CI Test"

on: 
  push:
    branches: [main]
  # pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installing Dependencies
        run: npm i
      - name: Run tests
        run: npm run test
    